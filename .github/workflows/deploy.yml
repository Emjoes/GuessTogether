name: Deploy Backend And Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  build-apk:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android APK
        run: >
          flutter build apk --release
          --dart-define=APP_VERSION=1.00
          --dart-define=API_BASE_URL=https://guess-together.gall-studio.com

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: guesstogether-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  deploy-backend:
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 45.153.191.240
      DEPLOY_USER: gall
      DEPLOY_ROOT: /home/gall/web/guess-together.gall-studio.com/private/backend
      RELEASE_ID: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Compile backend executable
        run: dart build cli --target bin/server.dart --output build/deploy

      - name: Prepare backend bundle
        run: |
          mkdir -p build/deploy/release/backend_packages
          cp -R build/deploy/bundle/. build/deploy/release/
          cp -R backend_packages/. build/deploy/release/backend_packages/
          tar -C build/deploy/release -czf build/deploy/backend-release.tar.gz .

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          scp -i ~/.ssh/deploy_key build/deploy/backend-release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/tmp/backend-${RELEASE_ID}.tar.gz"
          scp -i ~/.ssh/deploy_key scripts/deploy/remote_deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/tmp/remote_deploy.sh"
          scp -i ~/.ssh/deploy_key scripts/deploy/start_backend.sh "$DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/tmp/start_backend.sh"

      - name: Restart backend on server
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "\
            mkdir -p $DEPLOY_ROOT/bin && \
            cp /home/$DEPLOY_USER/tmp/start_backend.sh $DEPLOY_ROOT/bin/start_backend.sh && \
            chmod +x /home/$DEPLOY_USER/tmp/remote_deploy.sh $DEPLOY_ROOT/bin/start_backend.sh && \
            DEPLOY_ROOT=$DEPLOY_ROOT /home/$DEPLOY_USER/tmp/remote_deploy.sh $RELEASE_ID /home/$DEPLOY_USER/tmp/backend-${RELEASE_ID}.tar.gz"
