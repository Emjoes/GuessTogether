services:
  postgres:
    image: postgres:16
    container_name: guesstogether-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guesstogether
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guesstogether"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - guesstogether_postgres_data:/var/lib/postgresql/data

volumes:
  guesstogether_postgres_data:
