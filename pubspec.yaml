name: guesstogether
description: A Guess Together multiplayer quiz app with mock realtime adapters.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1

  # For flexible layout / accessibility helpers if needed later
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

