name: guesstogether
description: A Guess Together multiplayer quiz app with mock realtime adapters.
publish_to: "none"

version: 1.0.0+100

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  http: ^1.2.1
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.5.3
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_web_socket: ^3.0.0
  crypto: ^3.0.3

  # For flexible layout / accessibility helpers if needed later
  intl: ^0.20.2
  file_picker: ^10.3.10
  postgres: ^3.5.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/google_fonts/

